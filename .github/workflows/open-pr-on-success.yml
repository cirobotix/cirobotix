name: Open PR on successful CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - name: Set target branch
        id: target
        run: echo "base=main" >> "$GITHUB_OUTPUT"

      - name: Check whether PR already exists
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          BASE_BRANCH: ${{ steps.target.outputs.base }}
        run: |
          COUNT=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.pr_check.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          BASE_BRANCH: ${{ steps.target.outputs.base }}
        run: |
          gh pr create \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --title "Auto PR: $HEAD_BRANCH -> $BASE_BRANCH" \
            --body "$(cat <<EOF
          Dieser Pull Request wurde automatisch erstellt, nachdem die CI erfolgreich durchgelaufen ist.

          Quelle: \`$HEAD_BRANCH\`
          Ziel: \`$BASE_BRANCH\`
          Workflow: \`${{ github.event.workflow_run.name }}\`
          Commit: \`${{ github.event.workflow_run.head_sha }}\`
          EOF
          )"
